<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#faf3ea">
<meta name="color-scheme" content="light only">
<title>丘丘塔羅・線上抽牌</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Italianno&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#6d5760; --cream:#faf3ea; --blush:#f1cfd9; --deep:#dd9db4;
  --heart:#e9a8ba; --butter:#f2dfa7; --blue:#c3d8eb; --mint:#cde3d0;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0; padding:0;}
body{
  background-color:var(--cream);
  background-image:radial-gradient(rgba(221,157,180,.28) 1.2px, transparent 1.3px);
  background-size:26px 26px;
  color:var(--ink);
  font-family:'Zen Maru Gothic','PingFang TC','Yu Gothic','Microsoft JhengHei',sans-serif;
  font-size:15px; line-height:1.7;
  touch-action:manipulation;
  min-height:100dvh;
}
.wrap{max-width:520px; margin:0 auto; padding:14px 12px 170px;}

/* ── 頁首 ── */
.banner{
  position:relative; text-align:center;
  background:#fffdf8; border:1.6px solid var(--ink); border-radius:18px;
  padding:14px 16px 12px; margin-bottom:14px;
  box-shadow:3px 3px 0 rgba(221,157,180,.55);
}
.banner .script{
  font-family:'Italianno',cursive; font-size:30px; line-height:.8;
  color:var(--deep); display:block; margin-bottom:2px;
}
.banner h1{font-size:21px; font-weight:700; margin:0; letter-spacing:.12em;}
.banner p{margin:6px 0 0; font-size:13.5px; opacity:.92;}
.banner .spark{position:absolute; width:16px; height:16px;}
.banner .spark.a{left:10px; top:10px;} .banner .spark.b{right:12px; bottom:10px;}
.counterRow{
  display:flex; justify-content:center; align-items:center; gap:12px;
  margin:0 0 12px; font-size:13.5px;
}
.counterPill{
  background:#fffdf8; border:1.4px dashed var(--ink); border-radius:999px;
  padding:3px 14px;
}
.counterPill b{color:var(--deep); font-size:15px;}
.linkish{
  background:none; border:none; color:var(--ink); font:inherit; font-size:13px;
  text-decoration:underline dotted; opacity:.8; padding:2px 4px; cursor:pointer;
}

/* ── 牌桌 ── */
#table{display:grid; grid-template-columns:repeat(4,1fr); gap:7px;}
.card{
  position:relative; aspect-ratio:300/527; border:none; padding:0; cursor:pointer;
  border-radius:8px; background:transparent center/cover no-repeat;
  box-shadow:0 1.5px 4px rgba(109,87,96,.22);
  transition:transform .22s ease, box-shadow .22s ease, opacity .3s ease;
}
.card.sel{
  transform:translateY(-5px) scale(1.04);
  outline:2px solid var(--deep); outline-offset:1.5px;
  box-shadow:0 7px 14px rgba(221,157,180,.5); z-index:2;
}
.card .badge{
  display:none; position:absolute; top:-7px; right:-5px; width:21px; height:21px;
  background:#fffdf8; border:1.4px solid var(--ink); border-radius:50%;
  font-size:11.5px; font-weight:700; line-height:19px; color:var(--deep);
}
.card.sel .badge{display:block;}
.card.shake{animation:shake .34s;}
@keyframes shake{25%{transform:translateY(-5px) scale(1.04) rotate(-2.4deg)}75%{transform:translateY(-5px) scale(1.04) rotate(2.4deg)}}
body.done .card:not(.sel){opacity:.55; pointer-events:none;}

/* ── 底部抽牌盤 ── */
#tray{
  position:fixed; left:0; right:0; bottom:0; z-index:20;
  background:#fffdf8; box-shadow:0 -3px 14px rgba(109,87,96,.14);
  padding:14px 10px calc(10px + env(safe-area-inset-bottom));
}
#tray::before{
  content:""; position:absolute; left:0; right:0; top:-11px; height:12px;
  background:radial-gradient(circle at 9px 12px, #fffdf8 8.5px, transparent 9.5px);
  background-size:18px 12px; background-repeat:repeat-x;
}
.trayInner{max-width:520px; margin:0 auto; display:flex; align-items:center; justify-content:center; gap:8px;}
.slot{
  width:clamp(50px,13.5vw,70px); aspect-ratio:300/527; border-radius:6px;
  border:1.6px dashed rgba(109,87,96,.55); position:relative;
  display:flex; align-items:center; justify-content:center;
  font-size:13px; color:rgba(109,87,96,.5);
}
.slot.filled{border:none;}
.flip{width:100%; height:100%; perspective:600px;}
.flip .in{position:relative; width:100%; height:100%; transform-style:preserve-3d; transition:transform .75s cubic-bezier(.5,.1,.3,1);}
.flip .in.go{transform:rotateY(180deg);}
.face{position:absolute; inset:0; backface-visibility:hidden; -webkit-backface-visibility:hidden; border-radius:6px; overflow:hidden; box-shadow:0 1.5px 4px rgba(109,87,96,.25); background:#fffdf8 center/cover no-repeat;}
.face.front{transform:rotateY(180deg);}
.face img{width:100%; height:100%; object-fit:cover; display:block;}
img.rev{transform:rotate(180deg);}
#resultBtn{display:none; margin-left:6px;}
#resultBtn.show{display:inline-block; animation:pulse 1.6s infinite;}
@keyframes pulse{50%{transform:translateY(-2px); box-shadow:3.5px 4.5px 0 var(--deep);}}

/* ── 按鈕 ── */
.btn{
  font:inherit; font-size:14.5px; font-weight:500; color:var(--ink);
  background:#fffdf8; border:1.6px solid var(--ink); border-radius:999px;
  padding:8px 17px; cursor:pointer;
  box-shadow:2.5px 2.5px 0 var(--deep);
  transition:transform .12s ease, box-shadow .12s ease;
  text-decoration:none; display:inline-block;
}
.btn:active{transform:translate(2px,2px); box-shadow:0.5px 0.5px 0 var(--deep);}
.btn.tiny{font-size:13px; padding:6px 13px;}

/* ── 結果面板 ── */
#sheetWrap{
  position:fixed; inset:0; z-index:40; background:rgba(221,157,180,.34);
  backdrop-filter:blur(2px); -webkit-backdrop-filter:blur(2px);
  opacity:0; pointer-events:none; transition:opacity .3s ease;
}
#sheetWrap.open{opacity:1; pointer-events:auto;}
#sheet{
  position:absolute; left:0; right:0; bottom:0; max-height:92dvh; overflow-y:auto;
  background:var(--cream); border-radius:22px 22px 0 0;
  border-top:1.6px solid var(--ink);
  padding:10px 16px calc(22px + env(safe-area-inset-bottom));
  transform:translateY(100%); transition:transform .38s cubic-bezier(.4,.1,.2,1);
}
#sheetWrap.open #sheet{transform:translateY(0);}
.handle{width:44px; height:5px; border-radius:99px; background:rgba(109,87,96,.35); margin:2px auto 10px;}
#sheet h2{
  text-align:center; font-size:18px; font-weight:700; letter-spacing:.14em; margin:0 0 3px;
}
#sheet .sub{text-align:center; font-size:12.5px; opacity:.75; margin:0 0 13px;}
.rcards{display:flex; flex-wrap:wrap; justify-content:center; gap:11px 9px; margin-bottom:15px;}
.rcell{display:flex; flex-direction:column; align-items:center; gap:5px;}
.rcard{
  width:clamp(86px,26vw,124px); aspect-ratio:300/527; border-radius:8px; overflow:hidden;
  background:#fffdf8 center/cover no-repeat; box-shadow:0 3px 9px rgba(109,87,96,.3);
  padding:0; border:none; cursor:pointer;
}
.rcard img{width:100%; height:100%; object-fit:cover; display:block;}
.rtag{
  font-size:12px; background:#fffdf8; border:1.3px solid var(--ink);
  border-radius:999px; padding:1px 11px;
}
.rtag b{color:var(--deep);}
.copyBox{
  background:#fffdf8; border:1.5px dashed var(--ink); border-radius:14px;
  padding:11px 14px; font-size:13.5px; white-space:pre-wrap; line-height:1.75;
  margin-bottom:15px;
}
.btnRow{display:flex; flex-wrap:wrap; justify-content:center; gap:10px;}
.fallbackFace{
  width:100%; height:100%; display:flex; flex-direction:column; gap:4px;
  align-items:center; justify-content:center; background:#fffdf8;
  border:1.4px solid var(--ink); border-radius:inherit; font-size:11px; color:var(--ink);
}
.fallbackFace .code{font-size:15px; font-weight:700; color:var(--deep); letter-spacing:.08em;}

/* ── 燈箱 ── */
#lightbox{
  position:fixed; inset:0; z-index:60; background:rgba(109,87,96,.72);
  display:none; align-items:center; justify-content:center; padding:20px;
}
#lightbox.open{display:flex;}
#lightbox .big{
  max-width:min(88vw,380px); max-height:80dvh; aspect-ratio:300/527;
  border-radius:12px; overflow:hidden; box-shadow:0 10px 34px rgba(0,0,0,.4);
  background:#fffdf8 center/cover no-repeat;
}
#lightbox .big img{width:100%; height:100%; object-fit:cover; display:block;}
#lightbox p{position:absolute; bottom:26px; left:0; right:0; text-align:center; color:#fffdf8; font-size:13px;}

@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{transition:none!important; animation:none!important;}
}
</style>
</head>
<body>

<div class="wrap">
  <header class="banner">
    <svg class="spark a" viewBox="0 0 16 16"><path d="M8 0Q9.5 6.5 16 8Q9.5 9.5 8 16Q6.5 9.5 0 8Q6.5 6.5 8 0Z" fill="#f2dfa7" stroke="#6d5760" stroke-width="1"/></svg>
    <svg class="spark b" viewBox="0 0 16 16"><path d="M8 0Q9.5 6.5 16 8Q9.5 9.5 8 16Q6.5 9.5 0 8Q6.5 6.5 8 0Z" fill="#c3d8eb" stroke="#6d5760" stroke-width="1"/></svg>
    <span class="script">chuchu tarot</span>
    <h1>丘丘塔羅・線上抽牌</h1>
    <p>深呼吸，在心中默念想問的問題；<br>準備好了，憑直覺點選五張牌。</p>
  </header>

  <div class="counterRow">
    <span class="counterPill">已選 <b id="count">0</b> ／ 5</span>
    <button class="linkish" id="reshuffleTop">↻ 重新洗牌</button>
  </div>

  <main id="table" aria-label="牌桌"></main>
</div>

<div id="tray">
  <div class="trayInner" id="trayInner">
    <div class="slot" data-n="0">1</div>
    <div class="slot" data-n="1">2</div>
    <div class="slot" data-n="2">3</div>
    <div class="slot" data-n="3">4</div>
    <div class="slot" data-n="4">5</div>
    <button class="btn tiny" id="resultBtn">查看結果 🌷</button>
  </div>
</div>

<div id="sheetWrap">
  <div id="sheet">
    <div class="handle" id="sheetHandle"></div>
    <h2>🌷 本次抽牌</h2>
    <p class="sub">點牌可放大｜請將截圖與下方文字一起傳給丘 💌</p>
    <div class="rcards" id="rcards"></div>
    <div class="copyBox" id="copyBox"></div>
    <div class="btnRow">
      <button class="btn" id="copyBtn">複製結果</button>
      <button class="btn" id="reshuffleBtn">重新抽牌</button>
      <a class="btn" href="https://www.instagram.com/cyanholicc" target="_blank" rel="noopener">instagram ↗</a>
    </div>
  </div>
</div>

<div id="lightbox">
  <div class="big" id="lightboxCard"></div>
  <p>點任意處關閉</p>
</div>

<script>
/* ════════════════════════════════════════════════
   牌面圖片來源設定
   ────────────────────────────────────────────────
   預設使用公版 Rider-Waite（CC0，來自 yunruse/tarot 專案）。
   之後想改用自己 repo 裡的牌圖，把 IMG_BASE 換成你的資料夾，
   並讓 imgUrl() 回傳正確檔名即可。
   目前的 code 命名：
     大牌  "1"～"22"（依來源專案順序，1 = 愚者）
     小牌  w/c/s/p ＋ 1～14（權杖/聖杯/寶劍/錢幣；1=Ace，11～14=侍者/騎士/王后/國王）
   ════════════════════════════════════════════════ */
const IMG_BASE = 'https://media.githubusercontent.com/media/yunruse/tarot/gh-pages/cards/color/';
const imgUrl = code => IMG_BASE + code + '.jpg';

/* ── 色票 ── */
const INK='#6d5760', CREAM='#faf3ea', BLUSH='#f1cfd9', DEEP='#dd9db4',
      HEART='#e9a8ba', HEART_LIGHT='#f3c4d1',
      BUTTER='#f2dfa7', BLUE='#c3d8eb', MINT='#cde3d0';
const W=300, H=527;

/* ── 卡背 SVG 產生器 ── */
function scallopPath(x,y,w,h,c,target){
  function run(x1,y1,x2,y2){
    const dx=x2-x1, dy=y2-y1, len=Math.hypot(dx,dy);
    const n=Math.max(1,Math.round(len/target)), s=len/n, ux=dx/len, uy=dy/len;
    let px=x1, py=y1, str='';
    for(let i=0;i<n;i++){
      const nx=px+ux*s, ny=py+uy*s;
      str+=`A ${(s/2).toFixed(2)} ${(s/2).toFixed(2)} 0 0 1 ${nx.toFixed(2)} ${ny.toFixed(2)} `;
      px=nx; py=ny;
    }
    return str;
  }
  let p=`M ${x+c} ${y} `;
  p+=run(x+c,y,x+w-c,y)+`A ${c} ${c} 0 0 1 ${x+w} ${y+c} `;
  p+=run(x+w,y+c,x+w,y+h-c)+`A ${c} ${c} 0 0 1 ${x+w-c} ${y+h} `;
  p+=run(x+w-c,y+h,x+c,y+h)+`A ${c} ${c} 0 0 1 ${x} ${y+h-c} `;
  p+=run(x,y+h-c,x,y+c)+`A ${c} ${c} 0 0 1 ${x+c} ${y} Z`;
  return p;
}
function star4(cx,cy,r,fill,sw){
  const q=r*0.3;
  return `<path d="M${cx} ${cy-r} Q${cx+q} ${cy-q} ${cx+r} ${cy} Q${cx+q} ${cy+q} ${cx} ${cy+r} Q${cx-q} ${cy+q} ${cx-r} ${cy} Q${cx-q} ${cy-q} ${cx} ${cy-r} Z" fill="${fill}" stroke="${INK}" stroke-width="${sw||0.9}" stroke-linejoin="round"/>`;
}
const HEART_D='M0,10 C-8,2 -17,-1 -17,-9 C-17,-15 -12.5,-18 -8,-18 C-4,-18 -1,-15.5 0,-12.5 C1,-15.5 4,-18 8,-18 C12.5,-18 17,-15 17,-9 C17,-1 8,2 0,10 Z';
function heart(cx,cy,s,fill,sw){
  return `<g transform="translate(${cx},${cy}) scale(${s})">
    <path d="${HEART_D}" fill="${fill}" stroke="${INK}" stroke-width="${(sw||1.4)/s}" stroke-linejoin="round"/>
    <circle cx="-7.5" cy="-11" r="2.6" fill="#ffffff" opacity="0.78"/>
  </g>`;
}
function bow(cx,cy,s){
  return `<g transform="translate(${cx},${cy}) scale(${s})" stroke="${INK}" stroke-width="${1.1/s}" stroke-linejoin="round">
    <path d="M-2,3 C-6,11 -12,16 -18,19 L-11.5,20.5 C-8,15.5 -4.5,10 -1.5,5 Z" fill="${HEART_LIGHT}"/>
    <path d="M2,3 C6,11 12,16 18,19 L11.5,20.5 C8,15.5 4.5,10 1.5,5 Z" fill="${HEART_LIGHT}"/>
    <path d="M0,0 C-6,-9 -19,-9 -20,-1 C-21,6 -9,8 0,0 Z" fill="${HEART_LIGHT}"/>
    <path d="M0,0 C6,-9 19,-9 20,-1 C21,6 9,8 0,0 Z" fill="${HEART_LIGHT}"/>
    <circle cx="0" cy="0" r="3.4" fill="${HEART}"/>
  </g>`;
}
function crescent(cx,cy,r,rot,fill){
  return `<g transform="translate(${cx},${cy}) rotate(${rot||0})">
    <path d="M0,${-r} A${r},${r} 0 1,1 0,${r} A${r*0.78},${r*0.78} 0 1,0 0,${-r} Z" fill="${fill||BUTTER}" stroke="${INK}" stroke-width="0.9" stroke-linejoin="round"/>
  </g>`;
}
function swirl(cx,cy,s,rot){
  return `<g transform="translate(${cx},${cy}) rotate(${rot||0}) scale(${s||1})">
    <path d="M-8,4 C-8,-4 2,-8 6,-3 C9,1 5,7 0,5 C-3,3.8 -3.2,0.4 -0.5,-0.8" fill="none" stroke="${INK}" stroke-width="1" stroke-linecap="round"/>
  </g>`;
}
function pearlRing(cx,cy,rx,ry,n){
  let out='';
  for(let i=0;i<n;i++){
    const a=(i/n)*Math.PI*2-Math.PI/2;
    out+=`<circle cx="${(cx+rx*Math.cos(a)).toFixed(1)}" cy="${(cy+ry*Math.sin(a)).toFixed(1)}" r="2.7" fill="${CREAM}" stroke="${INK}" stroke-width="0.7"/>`;
  }
  return out;
}
const GRAIN=`<filter id="gr" x="0" y="0" width="100%" height="100%">
  <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2"/>
  <feColorMatrix type="matrix" values="0 0 0 0 0.42  0 0 0 0 0.34  0 0 0 0 0.36  0 0 0 0.6 0"/>
</filter>`;

function buildCardBack(){
  const palette=[BUTTER,BLUE,DEEP,MINT];
  const bandStars=[];
  [52,85,118,150,182,215,248].forEach((x,i)=>{
    bandStars.push(star4(x,19,5,palette[i%4],0.8));
    bandStars.push(star4(x,H-19,5,palette[(i+2)%4],0.8));
  });
  [52,90,128,166,204,242,280,318,356,394,432,470].forEach((y,i)=>{
    bandStars.push(star4(19,y,5,palette[(i+1)%4],0.8));
    bandStars.push(star4(W-19,y,5,palette[(i+3)%4],0.8));
  });
  const inner=scallopPath(32,32,W-64,H-64,14,15.5);
  const outerRect=`M 18 6 H ${W-18} A 12 12 0 0 1 ${W-6} 18 V ${H-18} A 12 12 0 0 1 ${W-18} ${H-6} H 18 A 12 12 0 0 1 6 ${H-18} V 18 A 12 12 0 0 1 18 6 Z`;
  const CX=150, CY=252;
  const sprinkles=[
    crescent(150,74,11,18), crescent(150,H-74,11,198),
    star4(74,92,7,BUTTER), star4(226,104,5,BLUE),
    star4(58,158,4,MINT), star4(242,168,6,DEEP),
    swirl(98,130,1,-15), swirl(204,82,0.9,30),
    heart(214,146,0.36,HEART_LIGHT,2.4),
    `<circle cx="182" cy="62" r="2" fill="${INK}" opacity="0.55"/>`,
    `<circle cx="112" cy="76" r="1.6" fill="${INK}" opacity="0.5"/>`,
    star4(46,252,3.4,CREAM), star4(254,252,3.4,CREAM),
    star4(226,H-92,7,BLUE), star4(74,H-104,5,BUTTER),
    star4(242,H-158,4,DEEP), star4(58,H-168,6,MINT),
    swirl(202,H-130,1,165), swirl(96,H-82,0.9,210),
    heart(86,H-146,0.36,HEART_LIGHT,2.4),
    `<circle cx="118" cy="${H-62}" r="2" fill="${INK}" opacity="0.55"/>`,
    `<circle cx="188" cy="${H-76}" r="1.6" fill="${INK}" opacity="0.5"/>`
  ].join('');
  const emblem=`
    <ellipse cx="${CX}" cy="${CY}" rx="61" ry="81" fill="${CREAM}" stroke="${INK}" stroke-width="1"/>
    <ellipse cx="${CX}" cy="${CY}" rx="53" ry="72" fill="none" stroke="${INK}" stroke-width="0.9" stroke-dasharray="1.6 3.6"/>
    ${pearlRing(CX,CY,61,81,30)}
    ${star4(CX-36,CY-46,4.5,BUTTER,0.8)}
    ${star4(CX+38,CY-40,3.5,BLUE,0.8)}
    ${star4(CX-38,CY+44,3.5,MINT,0.8)}
    ${star4(CX+36,CY+48,4.5,DEEP,0.8)}
    ${heart(CX,CY-12,2.15,HEART)}
    ${bow(CX,CY+23,1.05)}
  `;
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W} ${H}">
  <defs>${GRAIN}
    <radialGradient id="glow" cx="50%" cy="48%" r="60%">
      <stop offset="0%" stop-color="#f7e2e9"/><stop offset="100%" stop-color="${BLUSH}"/>
    </radialGradient>
  </defs>
  <rect width="${W}" height="${H}" rx="14" fill="url(#glow)"/>
  <path d="${outerRect} ${inner}" fill="${CREAM}" fill-rule="evenodd"/>
  <path d="${outerRect}" fill="none" stroke="${INK}" stroke-width="1.5"/>
  <path d="${inner}" fill="none" stroke="${INK}" stroke-width="1.1"/>
  ${bandStars.join('')}
  ${sprinkles}
  ${emblem}
  <rect width="${W}" height="${H}" rx="14" filter="url(#gr)" opacity="0.09"/>
</svg>`;
}
function buildBlankFace(){
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W} ${H}">
  <defs>${GRAIN}</defs>
  <rect width="${W}" height="${H}" rx="14" fill="${CREAM}"/>
  <rect x="7" y="7" width="${W-14}" height="${H-14}" rx="11" fill="none" stroke="${INK}" stroke-width="1.4"/>
  <rect x="16" y="16" width="${W-32}" height="${H-32}" rx="8" fill="none" stroke="${INK}" stroke-width="0.9" stroke-dasharray="2 4"/>
  ${heart(150,264,2.6,HEART)}
  <rect width="${W}" height="${H}" rx="14" filter="url(#gr)" opacity="0.07"/>
</svg>`;
}

/* 卡背、空白牌面轉成 data URI，掛到 CSS 變數 */
const BACK_URI  = 'data:image/svg+xml;charset=utf-8,'+encodeURIComponent(buildCardBack());
const BLANK_URI = 'data:image/svg+xml;charset=utf-8,'+encodeURIComponent(buildBlankFace());

/* ── 牌組 ── */
function buildCodes(){
  const codes=[];
  for(let i=0;i<=21;i++) codes.push(String(i));           // 大阿爾克那 22（愚者=0，世界=21）
  for(const s of ['w','c','s','p'])
    for(let i=1;i<=14;i++) codes.push(s+i);               // 小阿爾克那 56
  codes.push('BLANK','BLANK');                            // 空白牌 2
  return codes;                                           // 共 80 張
}
function shuffle(arr){
  const a=arr.slice(), rnd=new Uint32Array(a.length);
  crypto.getRandomValues(rnd);
  for(let i=a.length-1;i>0;i--){
    const j=rnd[i]%(i+1); [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

let deck=[], picks=[];
const $=id=>document.getElementById(id);
const tableEl=$('table');

function init(){
  deck=shuffle(buildCodes()).map(code=>({
    code,
    blank: code==='BLANK',
    rev: Math.random()<0.5
  }));
  picks=[];
  document.body.classList.remove('done');
  $('count').textContent='0';
  $('resultBtn').classList.remove('show');
  $('sheetWrap').classList.remove('open');
  document.querySelectorAll('.slot').forEach((s,i)=>{
    s.classList.remove('filled'); s.innerHTML=String(i+1);
  });
  let html='';
  for(let i=0;i<deck.length;i++){
    html+=`<button class="card" data-i="${i}" aria-label="第${i+1}個牌位" style="background-image:var(--backimg)"><span class="badge"></span></button>`;
  }
  tableEl.innerHTML=html;
  window.scrollTo({top:0});
}
document.documentElement.style.setProperty('--backimg',`url("${BACK_URI}")`);
document.documentElement.style.setProperty('--blankimg',`url("${BLANK_URI}")`);

/* ── 牌面內容（翻開後那一面） ── */
function frontHTML(card){
  if(card.blank){
    return `<div class="face front" style="background-image:var(--blankimg)"></div>`;
  }
  return `<div class="face front">
    <img src="${imgUrl(card.code)}" alt="牌面" class="${card.rev?'rev':''}" loading="eager"
      onerror="this.outerHTML='<div class=&quot;fallbackFace&quot;><span>圖片未載入</span><span class=&quot;code&quot;>${card.code}${card.rev?'&#8595;':''}</span></div>'">
  </div>`;
}

/* ── 點牌 ── */
tableEl.addEventListener('click',e=>{
  const el=e.target.closest('.card');
  if(!el) return;
  const i=+el.dataset.i;
  if(el.classList.contains('sel')){
    el.classList.remove('shake'); void el.offsetWidth; el.classList.add('shake');
    return; // 抽出的牌不收回
  }
  if(picks.length>=5) return;
  picks.push(i);
  el.classList.add('sel');
  el.querySelector('.badge').textContent=picks.length;
  $('count').textContent=picks.length;
  fillSlot(picks.length-1, deck[i]);
  if(picks.length===5){
    document.body.classList.add('done');
    $('resultBtn').classList.add('show');
    setTimeout(openSheet, 1150);
  }
});

function fillSlot(n,card){
  const slot=document.querySelector(`.slot[data-n="${n}"]`);
  slot.classList.add('filled');
  slot.innerHTML=`<div class="flip"><div class="in">
    <div class="face" style="background-image:var(--backimg)"></div>
    ${frontHTML(card)}
  </div></div>`;
  requestAnimationFrame(()=>setTimeout(()=>{
    slot.querySelector('.in').classList.add('go');
  },120));
}

/* ── 結果面板 ── */
function pad(n){return String(n).padStart(2,'0');}
function resultText(){
  const t=new Date();
  const stamp=`${t.getFullYear()}.${pad(t.getMonth()+1)}.${pad(t.getDate())} ${pad(t.getHours())}:${pad(t.getMinutes())}`;
  const lines=picks.map((idx,i)=>{
    const c=deck[idx];
    return `第${i+1}張｜${c.blank?'空白牌 🤍':(c.rev?'逆位':'正位')}`;
  });
  return `🕯 丘丘塔羅・線上抽牌\n${stamp}\n\n${lines.join('\n')}\n\n請連同牌面截圖一起回傳給丘 💌`;
}
function openSheet(){
  const rc=$('rcards');
  rc.innerHTML=picks.map((idx,i)=>{
    const c=deck[idx];
    const tag=c.blank?'空白':(c.rev?'逆位':'正位');
    const inner=c.blank
      ? `<button class="rcard" data-p="${i}" style="background-image:var(--blankimg)"></button>`
      : `<button class="rcard" data-p="${i}"><img src="${imgUrl(c.code)}" alt="第${i+1}張牌" class="${c.rev?'rev':''}"
           onerror="this.outerHTML='<div class=&quot;fallbackFace&quot;><span>圖片未載入</span><span class=&quot;code&quot;>${c.code}${c.rev?'&#8595;':''}</span></div>'"></button>`;
    return `<div class="rcell">${inner}<span class="rtag">${i+1}・<b>${tag}</b></span></div>`;
  }).join('');
  $('copyBox').textContent=resultText();
  $('copyBtn').textContent='複製結果';
  $('sheetWrap').classList.add('open');
}
$('resultBtn').addEventListener('click',openSheet);
$('sheetHandle').addEventListener('click',()=>$('sheetWrap').classList.remove('open'));
$('sheetWrap').addEventListener('click',e=>{
  if(e.target.id==='sheetWrap') $('sheetWrap').classList.remove('open');
});

/* 燈箱 */
$('rcards').addEventListener('click',e=>{
  const btn=e.target.closest('.rcard'); if(!btn) return;
  const c=deck[picks[+btn.dataset.p]];
  const box=$('lightboxCard');
  box.style.backgroundImage = c.blank ? 'var(--blankimg)' : 'none';
  box.innerHTML = c.blank ? '' :
    `<img src="${imgUrl(c.code)}" alt="放大牌面" class="${c.rev?'rev':''}">`;
  $('lightbox').classList.add('open');
});
$('lightbox').addEventListener('click',()=>$('lightbox').classList.remove('open'));

/* 複製 */
$('copyBtn').addEventListener('click',async()=>{
  const text=resultText();
  try{
    await navigator.clipboard.writeText(text);
  }catch(err){
    const ta=document.createElement('textarea');
    ta.value=text; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); ta.remove();
  }
  $('copyBtn').textContent='已複製 ♡';
  setTimeout(()=>$('copyBtn').textContent='複製結果',1800);
});

/* 重新洗牌 */
function reshuffle(){
  if(picks.length===0 || confirm('要重新洗牌嗎？目前抽出的牌會清空。')) init();
}
$('reshuffleBtn').addEventListener('click',reshuffle);
$('reshuffleTop').addEventListener('click',reshuffle);

init();
</script>
</body>
</html>
